  <style>
    :root {
      --yt-bg: #0f0f0f;
      --yt-bg-secondary: #212121;
      --yt-bg-tertiary: #3f3f3f;
      --yt-text-primary: #f1f1f1;
      --yt-text-secondary: #aaaaaa;
      --yt-red: #ff0000;
      --yt-hover: #272727;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--yt-bg);
      color: var(--yt-text-primary);
      margin: 0;
      min-height: 100vh;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px 16px;
      padding: 24px;
    }
    .video-card {
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .video-card:hover {
      transform: scale(1.02);
    }
    .thumbnail-wrapper {
      position: relative;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: var(--yt-bg-secondary);
    }
    .thumbnail-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .duration-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .sidebar {
      width: 240px;
      position: fixed;
      left: 0;
      top: 56px;
      bottom: 0;
      background: var(--yt-bg);
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 10px 24px;
      cursor: pointer;
      border-radius: 0 24px 24px 0;
      transition: background 0.15s;
    }
    .sidebar-item:hover {
      background: var(--yt-hover);
    }
    .sidebar-item.active {
      background: var(--yt-hover);
    }
    .main-content {
      margin-left: 240px;
      margin-top: 56px;
      min-height: calc(100vh - 56px);
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--yt-bg);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .search-bar {
      flex: 1;
      max-width: 640px;
      display: flex;
      margin: 0 auto;
    }
    .search-bar input {
      flex: 1;
      background: var(--yt-bg-secondary);
      border: 1px solid var(--yt-bg-tertiary);
      padding: 10px 16px;
      border-radius: 40px 0 0 40px;
      color: var(--yt-text-primary);
      font-size: 16px;
      outline: none;
    }
    .search-bar input:focus {
      border-color: #1c62b9;
    }
    .search-bar input::placeholder {
      color: var(--yt-text-secondary);
    }
    .search-btn {
      background: var(--yt-bg-tertiary);
      border: 1px solid var(--yt-bg-tertiary);
      border-left: none;
      padding: 10px 20px;
      border-radius: 0 40px 40px 0;
      cursor: pointer;
      color: var(--yt-text-primary);
    }
    .search-btn:hover {
      background: #4f4f4f;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--yt-text-primary);
      transition: background 0.15s;
    }
    .icon-btn:hover {
      background: var(--yt-hover);
    }
    .channel-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .video-info {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .video-details {
      flex: 1;
      min-width: 0;
    }
    .video-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-meta {
      font-size: 12px;
      color: var(--yt-text-secondary);
      margin-top: 4px;
    }
    @media (max-width: 1280px) {
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .video-grid { grid-template-columns: 1fr; padding: 16px; }
    }
  </style>
</head>
