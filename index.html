<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TubeView - 動画を楽しもう</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --yt-bg: #0f0f0f;
      --yt-bg-secondary: #212121;
      --yt-bg-tertiary: #3f3f3f;
      --yt-text-primary: #f1f1f1;
      --yt-text-secondary: #aaaaaa;
      --yt-red: #ff0000;
      --yt-hover: #272727;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--yt-bg);
      color: var(--yt-text-primary);
      margin: 0;
      min-height: 100vh;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px 16px;
      padding: 24px;
    }
    .video-card {
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .video-card:hover {
      transform: scale(1.02);
    }
    .thumbnail-wrapper {
      position: relative;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: var(--yt-bg-secondary);
    }
    .thumbnail-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .duration-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .sidebar {
      width: 240px;
      position: fixed;
      left: 0;
      top: 56px;
      bottom: 0;
      background: var(--yt-bg);
      overflow-y: auto;
      padding: 12px 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 10px 24px;
      cursor: pointer;
      border-radius: 0 24px 24px 0;
      transition: background 0.15s;
    }
    .sidebar-item:hover {
      background: var(--yt-hover);
    }
    .sidebar-item.active {
      background: var(--yt-hover);
    }
    .main-content {
      margin-left: 240px;
      margin-top: 56px;
      min-height: calc(100vh - 56px);
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--yt-bg);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .search-bar {
      flex: 1;
      max-width: 640px;
      display: flex;
      margin: 0 auto;
    }
    .search-bar input {
      flex: 1;
      background: var(--yt-bg-secondary);
      border: 1px solid var(--yt-bg-tertiary);
      padding: 10px 16px;
      border-radius: 40px 0 0 40px;
      color: var(--yt-text-primary);
      font-size: 16px;
      outline: none;
    }
    .search-bar input:focus {
      border-color: #1c62b9;
    }
    .search-bar input::placeholder {
      color: var(--yt-text-secondary);
    }
    .search-btn {
      background: var(--yt-bg-tertiary);
      border: 1px solid var(--yt-bg-tertiary);
      border-left: none;
      padding: 10px 20px;
      border-radius: 0 40px 40px 0;
      cursor: pointer;
      color: var(--yt-text-primary);
    }
    .search-btn:hover {
      background: #4f4f4f;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--yt-text-primary);
      transition: background 0.15s;
    }
    .icon-btn:hover {
      background: var(--yt-hover);
    }
    .channel-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .video-info {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .video-details {
      flex: 1;
      min-width: 0;
    }
    .video-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-meta {
      font-size: 12px;
      color: var(--yt-text-secondary);
      margin-top: 4px;
    }
    @media (max-width: 1280px) {
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .video-grid { grid-template-columns: 1fr; padding: 16px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <button class="icon-btn" aria-label="メニュー">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <a href="/" class="flex items-center gap-1" style="text-decoration: none; color: inherit;">
      <svg width="32" height="32" viewBox="0 0 90 20" fill="currentColor"><path d="M27.9727 3.12324C27.6435 2.0833 26.6768 1.37378 25.6102 1.37378H24.9722V20H27.3808V13.8874H27.7757C28.6768 13.8874 29.5803 13.6501 30.2382 13.1687C31.5312 12.2118 31.5312 10.6582 31.5312 9.59367C31.5312 7.63921 29.9453 5.47235 27.9727 3.12324Z"/><path d="M23.6348 5.3485H21.0272V20H23.6348V5.3485Z"/><path d="M17.8537 20V5.3485H15.2461V17.0486C15.2461 18.7553 16.0283 20 17.8537 20Z"/><path d="M15.2461 2.85272C15.2461 1.27483 16.0283 0 17.1104 0C18.1924 0 18.9746 1.27483 18.9746 2.85272C18.9746 4.43062 18.1924 5.70544 17.1104 5.70544C16.0283 5.70544 15.2461 4.43062 15.2461 2.85272Z"/><path d="M8.85352 20V13.6364H8.45862C7.55751 13.6364 6.65406 13.3991 5.99609 12.9177C4.70312 11.9608 4.70312 10.4072 4.70312 9.34265C4.70312 7.38819 6.28906 5.22133 8.26172 2.87222C8.59082 3.91217 9.55751 4.62168 10.6241 4.62168H11.2622V0H8.85352V5.3485H5.24609V8.82397H8.85352V20Z"/><path d="M0 20H2.60742V5.3485H0V20Z"/></svg>
      <span class="font-bold text-xl ml-1">TubeView</span>
    </a>
    <div class="search-bar">
      <input type="text" placeholder="検索">
      <button class="search-btn" aria-label="検索">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
    </div>
    <div class="flex items-center gap-2">
      <button class="icon-btn" aria-label="アップロード"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M14 13v4h-4v-4H7l5-5 5 5h-3zm-1 2.408A2.607 2.607 0 0 1 12.408 16 2.607 2.607 0 0 1 10 13.408V13h4v.408zM12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm0-2a8 8 0 1 0 0-16 8 8 0 0 0 0 16z"/></svg></button>
      <button class="icon-btn" aria-label="通知"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></button>
      <button class="icon-btn" aria-label="アカウント"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);"></div></button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="#" class="sidebar-item active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>ホーム</span>
    </a>
    <a href="#" class="sidebar-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      <span>ショート</span>
    </a>
    <a href="#" class="sidebar-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 18v-6l5 3-5 3zm7-15H7v1h10V3zm0 19H7v1h10v-1zm0-18H7v1h10V4zM7 6v12h10V6H7z"/></svg>
      <span>登録チャンネル</span>
    </a>
    <a href="#" class="sidebar-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      <span>ライブラリ</span>
    </a>
    <a href="#" class="sidebar-item">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      <span>履歴</span>
    </a>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="video-grid" id="videoGrid"></div>
  </main>

    const grid = document.getElementById('videoGrid');
    videos.forEach(v => {
      const card = document.createElement('article');
      card.className = 'video-card';
      card.innerHTML = `
        <div class="thumbnail-wrapper">
          <img src="${v.thumb}" alt="${v.title}" loading="lazy">
          <span class="duration-badge">${v.duration}</span>
        </div>
        <div class="video-info">
          <img class="channel-avatar" src="${v.avatar}" alt="${v.channel}">
          <div class="video-details">
            <h3 class="video-title">${v.title}</h3>
            <p class="video-meta">${v.channel}</p>
            <p class="video-meta">${v.views} 視聴 · ${v.time}</p>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

</body>
</html>
